name: Update Project Live Metrics

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          package-manager-cache: false

      - name: Refresh project metrics
        run: npm run fetch:metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit refreshed metrics
        run: |
          if git diff --quiet -- public/project-live-metrics.json; then
            echo "No metric changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/project-live-metrics.json
          git commit -m "chore: update project live metrics"
          git push
